---
# This playbook doesn't support window machine
- name: Configuring MacOS machine
  gather_facts: true
  hosts: localhost

  vars:
    general_dependencies:
      - kubectl
      - bash-completion
      - kubectx
      - helm
      - git
      - podman
      - liquibase
      - sqlc
      - sysdig
      - jq
      - yq
      - direnv
      - golang-migrate
    brew_cask_dependencies:
      - iterm2
      # - zoom
      # - google-chrome
      # - aerial
      # - notion
      # - postman
      # - docker
      # - dbeaver-community
      # - keka
      # - openkey
      # - microsoft-edge
      # - proxyman
    brew_dependencies:
      - zsh-completions
      - mas
      - derailed/k9s/k9s
      - vegeta
      - protobuf
      - opentofu
      - pstree
      - zig
      - go
    mas_dependencies:
      - 1216253186 # Apnea
      - 595191960 # CopyClip
      - 1096128050 # PomoDone
      - 6461776692 # Rad timer
      - 1039633667 # Irvue
      - 1178074963 # Tayasui Sketches
      - 1476545828 # MasDroid
    apt_dependencies:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - protobuf-compiler
      - psmisc
      - golang-go
    snap_dependencies:
      - k9s
      - dbeaver-ce
      - opentofu
      - zig

  tasks:
    - name: OS details
      ansible.builtin.debug:
        msg: "{{ ansible_os_family }}"

    - name: Exit unsupported OS
      ansible.builtin.meta: end_host
      when: ansible_os_family == "Windows"

    - name: Install general dependencies
      ansible.builtin.package:
        name: "{{ general_dependencies }}"
        state: present

    - name: Install MacOS dependencies
      when: ansible_os_family == "Darwin"
      block:
        - name: Install OSS using homebrew
          ansible.builtin.package:
            name: "{{ brew_dependencies }}"
            state: present

        # - name: Install tools using homebrew_cask
        #   community.general.homebrew_cask:
        #     name: "{{ brew_cask_dependencies }}"
        #     state: present
        #     accept_external_apps: true
        #     install_options: "debug"

        # - name: Install applications from AppStore using mas
        #   community.general.mas:
        #     id: "{{ mas_dependencies }}"
        #     state: present

    - name: Install Ubuntu dependencies
      when: ansible_os_family != "Darwin"
      block:
        - name: Trust GPG key and configure APT repositories
          ansible.builtin.shell: |
            # sysdig
            if ! (which sysdig) &> /dev/null; then
              curl -s https://download.sysdig.com/DRAIOS-GPG-KEY.public | sudo apt-key add -;
              sudo curl -s -o /etc/apt/sources.list.d/draios.list https://download.sysdig.com/stable/deb/draios.list;
            fi;

            # git
            if ! (which git) &> /dev/null; then
              add-apt-repository ppa:git-core/ppa;
              sudo apt-get update;
            fi;

            # yq
            if ! (which yq) &> /dev/null; then
              sudo add-apt-repository ppa:rmescandon/yq;
            fi;

            # golang-migrate
            if ! (which yq) &> /dev/null; then
              curl -s https://packagecloud.io/install/repositories/golang-migrate/migrate/script.deb.sh | sudo bash;
            fi;

          changed_when: false

        - name: Install APT dependencies
          ansible.builtin.apt:
            update_cache: true
            name: "{{ apt_dependencies }}"

        - name: Install snap dependencies
          community.general.snap:
            name: "{{ snap_dependencies }}"
            classic: yes
            channel: stable

        - name: Install vegeta
          ansible.builtin.shell: |
            if which vegeta > /dev/null 2>&1; then
              echo "vegeta is already installed";
            else
              echo "installing vegeta..."
              cd ~;
              git clone https://github.com/tsenart/vegeta;
              cd vegeta;
              make vegeta;
              mv vegeta ~/bin;
              cd ~;
              rm -rf vegeta;
            fi;
          changed_when: false;

    # Custom install tools
    - name: Custom install general tools
      block:
        - name: Install Istio
          ansible.builtin.shell: |
            if ! (which istioctl) &> /dev/null; then
              echo "installing istio";
              (curl -sL https://istio.io/downloadIstioctl | sh - && export PATH=$HOME/.istioctl/bin:$PATH);
            else
              echo "istio existed";
            fi;
          register: istio_output
          changed_when: istio_output.stdout != "istio existed"

        - name: Install nvm
          ansible.builtin.shell: |
            if ! (which nvm) &> /dev/null; then
              echo "installing nvm";
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
            else
              echo "nvm existed";
            fi;
          args:
            creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
          changed_when: false

        - name: Install NodeJS using nvm
          ansible.builtin.shell: |
            . {{ ansible_env.HOME }}/.nvm/nvm.sh && nvm install "{{ nodejs_version }}" && nvm use  "{{ nodejs_version }}"
          args:
            executable: /bin/bash
            chdir: "{{ ansible_env.HOME }}"
            creates: "{{ ansible_env.HOME }}/.nvm/versions/{{ nodejs_version }}"
          register: nodejs_output
          changed_when: not nodejs_output.stderr is search("already installed")

        - name: Install SDK Man and Java
          ansible.builtin.import_role:
            name: java

        - name: Update shell profile
          ansible.builtin.lineinfile:
            path: "{{ os_var.shell_profile[ansible_os_family] }}"
            line: "{{ item }}"
          loop:
            - "source <(kubectl completion {{ os_var.preferred_shell[ansible_os_family] }})"
            - 'eval "$(direnv hook {{ os_var.preferred_shell[ansible_os_family] }})"'
            - 'source "$HOME/.sdkman/bin/sdkman-init.sh"'

        - name: Ensure alias
          ansible.builtin.lineinfile:
            path: "{{ os_var.shell_profile[ansible_os_family] }}"
            line: "{{ item }}"
          loop:
            - alias grep='grep --color=auto'
            - alias ll='ls -al'
            - alias dcp='docker-compose'
            - alias ter='terraform'
            - alias pwsleep='pmset sleepnow'
            - alias mks='minikube'
            - alias k='kubectl'
            - alias mergemain='git fetch origin main:main && git merge main'
            - alias greset='git reset --hard'
            - alias gundo='git reset HEAD~'
            - alias gcurr="git branch | grep '*'"
            - alias gmain='git checkout main && git pull'
            - alias ap='ansible-playbook'
            - alias gitcleanbranches='git branch | xargs -I % echo "git push -d % ; git branch -D %" | zsh'
            - alias wk='watch kubectl'
            - alias gitgrep='git branch | grep '
            - alias py='python3'
            - alias pip='pip3'
            - alias g='gcloud'
            - alias kus='kustomize'
            - alias amendforce='git commit --amend --no-edit && git push --force'
            - alias amen0edit='git commit --amend --no-edit'
            - alias docker='/Applications/Rancher\ Desktop.app/Contents/Resources/resources/darwin/bin/docker'
            - alias stopallcontainer='docker ps --format json | jq .ID | xargs -I % docker stop %'
            - alias vpnreset='sh /Users/Tho_Tran/Desktop/vpn-reset.sh';
            - export yaml='--dry-run=client -oyaml'
            - export now='--force --grace-period 0'
