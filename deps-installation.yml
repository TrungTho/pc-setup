---
# This playbook doesn't support window machine
- name: Configuring MacOS machine
  gather_facts: true
  hosts: localhost

  vars:
    general_dependencies:
      - kubectl
      - kubectx
      - helm
      - git
      - podman
      - liquibase
      - sqlc
      - sysdig
      - jq
      - yq
      - direnv
    brew_cask_dependencies:
      - iterm2
      # - zoom
      # - google-chrome
      # - aerial
      # - notion
      # - postman
      # - docker
      # - dbeaver-community
      # - keka
      # - openkey
      # - microsoft-edge
      # - proxyman
    brew_dependencies:
      - zsh-completions
      - mas
      - derailed/k9s/k9s
      - vegeta
      - protobuf
      - opentofu
      - pstree
      - zig
      - go
    mas_dependencies:
      - 1216253186 # Apnea
      - 595191960 # CopyClip
      - 1096128050 # PomoDone
      - 6461776692 # Rad timer
      - 1039633667 # Irvue
      - 1178074963 # Tayasui Sketches
      - 1476545828 # MasDroid
    apt_dependencies:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - protobuf-compiler
      - psmisc
      - golang-go
    snap_dependencies:
      - k9s
      - dbeaver-ce
      - opentofu
      - zig

  tasks:
    - name: OS details
      ansible.builtin.debug:
        msg: "{{ ansible_os_family }}"

    - name: Exit unsupported OS
      ansible.builtin.meta: end_host
      when: ansible_os_family == "Windows"

    - name: Install general dependencies
      ansible.builtin.package:
        name: "{{ general_dependencies }}"
        state: present

    - name: Install MacOS dependencies
      when: ansible_os_family == "Darwin"
      block:
        - name: Install OSS using homebrew
          ansible.builtin.homebrew:
            name: "{{ brew_dependencies }}"
            state: present

        # - name: Install tools using homebrew_cask
        #   community.general.homebrew_cask:
        #     name: "{{ brew_cask_dependencies }}"
        #     state: present
        #     accept_external_apps: true
        #     install_options: "debug"

        # - name: Install applications from AppStore using mas
        #   community.general.mas:
        #     id: "{{ mas_dependencies }}"
        #     state: present

        - name: Update ~/.zshrc
          ansible.builtin.shell: |
            # kubectl completion
            if ! (cat ~/.zshrc | grep 'kubectl completion zsh') &> /dev/null; then
              echo "source <(kubectl completion zsh)";
            else
              echo "kubectl completion existed";
            fi;

            # direnv
            if ! (cat ~/.zshrc | grep 'direnv hook zsh') &> /dev/null; then
              echo 'eval "$(direnv hook zsh)"' >> ~/.zshrc;
            else
              echo "direnv existed";
            fi;
          register: zsh_output
          changed_when: zsh_output.stdout != "existed"

    - name: Install Ubuntu dependencies
      when: ansible_os_family != "Darwin"
      block:
        - name: Trust GPG key and configure APT repositories
          ansible.builtin.shell: |
            # sysdig
            curl -s https://download.sysdig.com/DRAIOS-GPG-KEY.public | sudo apt-key add -;
            sudo curl -s -o /etc/apt/sources.list.d/draios.list https://download.sysdig.com/stable/deb/draios.list;

            # git
            add-apt-repository ppa:git-core/ppa;
            sudo apt-get update;

            # yq
            sudo add-apt-repository ppa:rmescandon/yq
          changed_when: false

        - name: Install APT dependencies
          ansible.builtin.apt:
            update_cache: true
            name: "{{ apt_dependencies }}"

        - name: Install snap dependencies
          community.general.snap:
            name: "{{ snap_dependencies }}"
            classic: yes
            channel: stable

        - name: Install vegeta
          ansible.builtin.shell: |
            if which vegeta > /dev/null 2>&1; then
              echo "vegeta is already installed";
            else
              echo "installing vegeta..."
              cd ~;
              git clone https://github.com/tsenart/vegeta;
              cd vegeta;
              make vegeta;
              mv vegeta ~/bin;
              cd ~;
              rm -rf vegeta;
            fi;
          changed_when: false;

        - name: Update ~/.bashrc
          ansible.builtin.shell: |
            # direnv
            if ! (cat ~/.zshrc | grep 'direnv hook zsh') &> /dev/null; then
              echo 'eval "$(direnv hook zsh)"' >> ~/.zshrc;
            else
              echo "direnv existed";
            fi;

    # Custom install tools
    - name: Custom install general tools
      block:
        - name: Install Istio
          ansible.builtin.shell: |
            if ! (which istioctl) &> /dev/null; then
              echo "installing istio";
              (curl -sL https://istio.io/downloadIstioctl | sh - && export PATH=$HOME/.istioctl/bin:$PATH);
            else
              echo "istio existed";
            fi;
          changed_when: istio_output.stdout != "existed"

        - name: Install nvm
          ansible.builtin.shell: |
            if ! (which nvm) &> /dev/null; then
              echo "installing nvm";
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
            else
              echo "nvm existed";
            fi;
          args:
            creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
          changed_when: false
