---
# This playbook doesn't support window machine
- name: Configuring MacOS machine
  gather_facts: true
  hosts: localhost

  vars:
    general_dependencies:
      - kubectl
      - kubectx
      - helm
    brew_cask_dependencies:
      - iterm2
      # - zoom
      # - google-chrome
      # - aerial
      # - notion
      # - postman
      # - docker
      # - dbeaver-community
      # - keka
      # - openkey
      # - microsoft-edge
    brew_dependencies:
      - zsh-completions
      - mas
      - derailed/k9s/k9s
    mas_dependencies:
      - 1216253186 # Apnea
      - 595191960 # CopyClip
      - 1096128050 # PomoDone
      - 6461776692 # Rad timer
      - 1039633667 # Irvue
      - 1178074963 # Tayasui Sketches
      - 1476545828 # MasDroid
    apt_dependencies:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    snap_dependencies:
      - k9s
      - dbeaver-ce

  tasks:
    - name: OS details
      ansible.builtin.debug:
        msg: "{{ ansible_os_family }}"

    - name: Exit unsupported OS
      ansible.builtin.meta: end_host
      when: ansible_os_family == "Windows"

    - name: Install general dependencies
      ansible.builtin.package:
        name: "{{ general_dependencies }}"
        state: present

    - name: Install MacOS dependencies
      when: ansible_os_family == "Darwin"
      block:
        - name: Install OSS using homebrew
          ansible.builtin.homebrew:
            name: "{{ brew_dependencies }}"
            state: present

        # - name: Install tools using homebrew_cask
        #   community.general.homebrew_cask:
        #     name: "{{ brew_cask_dependencies }}"
        #     state: present
        #     accept_external_apps: true
        #     install_options: "debug"

        # - name: Install applications from AppStore using mas
        #   community.general.mas:
        #     id: "{{ mas_dependencies }}"
        #     state: present

        - name: Update ~/.zshrc
          ansible.builtin.shell: |
            if ! (cat ~/.zshrc | grep 'kubectl completion zsh') &> /dev/null; then
              echo "source <(kubectl completion zsh)";
            else
              echo "existed";
            fi;
          register: zsh_output
          changed_when: zsh_output.stdout != "existed"

    - name: Install Ubuntu dependencies
      when: ansible_os_family != "Darwin"
      block:
        - name: Install APT dependencies
          ansible.builtin.apt:
            update_cache: true
            name: "{{ apt_dependencies }}"

        - name: Install kubectl
          community.general.snap:
            name: "{{ snap_dependencies }}"
            classic: yes
            channel: stable

    # Custom install tools
    - name: Install Istio
      ansible.builtin.shell: |
        if ! (which istioctl) &> /dev/null; then
          (curl -sL https://istio.io/downloadIstioctl | sh - && export PATH=$HOME/.istioctl/bin:$PATH);
        else
          echo "existed";
        fi;
      register: istio_output
      changed_when: istio_output.stdout != "existed"
